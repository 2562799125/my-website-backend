<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>高德地图集成测试</title>
    <style>
        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            margin: 0;
            padding: 20px;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: #333;
            min-height: 100vh;
        }
        
        .container {
            max-width: 1200px;
            margin: 0 auto;
            background: white;
            border-radius: 15px;
            box-shadow: 0 20px 40px rgba(0,0,0,0.1);
            overflow: hidden;
        }
        
        .header {
            background: linear-gradient(135deg, #4CAF50 0%, #45a049 100%);
            color: white;
            padding: 30px;
            text-align: center;
        }
        
        .header h1 {
            margin: 0;
            font-size: 2.5em;
            font-weight: 300;
        }
        
        .header p {
            margin: 10px 0 0 0;
            opacity: 0.9;
            font-size: 1.1em;
        }
        
        .content {
            padding: 30px;
        }
        
        .section {
            margin-bottom: 30px;
            padding: 25px;
            border: 1px solid #e0e0e0;
            border-radius: 10px;
            background: #fafafa;
        }
        
        .section h2 {
            margin-top: 0;
            color: #4CAF50;
            font-size: 1.5em;
            border-bottom: 2px solid #4CAF50;
            padding-bottom: 10px;
        }
        
        .config-section {
            background: linear-gradient(135deg, #fff3e0 0%, #ffe0b2 100%);
            border-color: #ff9800;
        }
        
        .config-section h2 {
            color: #ff9800;
            border-bottom-color: #ff9800;
        }
        
        .input-group {
            margin-bottom: 20px;
        }
        
        .input-group label {
            display: block;
            margin-bottom: 8px;
            font-weight: 600;
            color: #555;
        }
        
        .input-group input {
            width: 100%;
            padding: 12px;
            border: 2px solid #ddd;
            border-radius: 8px;
            font-size: 16px;
            transition: border-color 0.3s;
        }
        
        .input-group input:focus {
            outline: none;
            border-color: #4CAF50;
        }
        
        .btn {
            background: linear-gradient(135deg, #4CAF50 0%, #45a049 100%);
            color: white;
            border: none;
            padding: 12px 25px;
            border-radius: 8px;
            cursor: pointer;
            font-size: 16px;
            font-weight: 600;
            transition: all 0.3s;
            margin-right: 10px;
            margin-bottom: 10px;
        }
        
        .btn:hover {
            transform: translateY(-2px);
            box-shadow: 0 5px 15px rgba(76, 175, 80, 0.3);
        }
        
        .btn-secondary {
            background: linear-gradient(135deg, #2196F3 0%, #1976D2 100%);
        }
        
        .btn-secondary:hover {
            box-shadow: 0 5px 15px rgba(33, 150, 243, 0.3);
        }
        
        .btn-warning {
            background: linear-gradient(135deg, #ff9800 0%, #f57c00 100%);
        }
        
        .btn-warning:hover {
            box-shadow: 0 5px 15px rgba(255, 152, 0, 0.3);
        }
        
        .status {
            padding: 15px;
            border-radius: 8px;
            margin: 15px 0;
            font-weight: 600;
        }
        
        .status.success {
            background: #d4edda;
            color: #155724;
            border: 1px solid #c3e6cb;
        }
        
        .status.error {
            background: #f8d7da;
            color: #721c24;
            border: 1px solid #f5c6cb;
        }
        
        .status.warning {
            background: #fff3cd;
            color: #856404;
            border: 1px solid #ffeaa7;
        }
        
        .status.info {
            background: #d1ecf1;
            color: #0c5460;
            border: 1px solid #bee5eb;
        }
        
        .test-results {
            background: white;
            border: 1px solid #ddd;
            border-radius: 8px;
            padding: 20px;
            margin-top: 20px;
            max-height: 400px;
            overflow-y: auto;
        }
        
        .test-item {
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 10px 0;
            border-bottom: 1px solid #eee;
        }
        
        .test-item:last-child {
            border-bottom: none;
        }
        
        .test-name {
            font-weight: 600;
        }
        
        .test-status {
            padding: 5px 12px;
            border-radius: 20px;
            font-size: 12px;
            font-weight: 600;
            text-transform: uppercase;
        }
        
        .test-status.pass {
            background: #d4edda;
            color: #155724;
        }
        
        .test-status.fail {
            background: #f8d7da;
            color: #721c24;
        }
        
        .test-status.pending {
            background: #fff3cd;
            color: #856404;
        }
        
        .feature-grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(300px, 1fr));
            gap: 20px;
            margin-top: 20px;
        }
        
        .feature-card {
            background: white;
            border: 1px solid #ddd;
            border-radius: 10px;
            padding: 20px;
            text-align: center;
            transition: transform 0.3s;
        }
        
        .feature-card:hover {
            transform: translateY(-5px);
            box-shadow: 0 10px 25px rgba(0,0,0,0.1);
        }
        
        .feature-icon {
            font-size: 3em;
            margin-bottom: 15px;
        }
        
        .feature-title {
            font-size: 1.2em;
            font-weight: 600;
            margin-bottom: 10px;
            color: #333;
        }
        
        .feature-desc {
            color: #666;
            line-height: 1.5;
        }
        
        .loading {
            display: inline-block;
            width: 20px;
            height: 20px;
            border: 3px solid #f3f3f3;
            border-top: 3px solid #4CAF50;
            border-radius: 50%;
            animation: spin 1s linear infinite;
            margin-right: 10px;
        }
        
        @keyframes spin {
            0% { transform: rotate(0deg); }
            100% { transform: rotate(360deg); }
        }
        
        .code-block {
            background: #f8f9fa;
            border: 1px solid #e9ecef;
            border-radius: 5px;
            padding: 15px;
            font-family: 'Courier New', monospace;
            font-size: 14px;
            overflow-x: auto;
            margin: 10px 0;
        }
    </style>
</head>
<body>
    <div class="container">
        <div class="header">
            <h1>🗺️ 高德地图集成测试</h1>
            <p>矿山可视化监管平台 - 高德地图API功能验证</p>
        </div>
        
        <div class="content">
            <!-- API配置部分 -->
            <div class="section config-section">
                <h2>🔧 API配置</h2>
                <div class="input-group">
                    <label for="amapApiKey">高德地图API密钥:</label>
                    <input type="text" id="amapApiKey" placeholder="请输入您的高德地图API Key">
                </div>
                <button class="btn" onclick="saveAmapApiKey()">保存API密钥</button>
                <button class="btn btn-secondary" onclick="loadCurrentConfig()">加载当前配置</button>
                <div id="configStatus"></div>
            </div>
            
            <!-- 系统状态检查 -->
            <div class="section">
                <h2>📊 系统状态检查</h2>
                <button class="btn" onclick="checkSystemStatus()">检查系统状态</button>
                <button class="btn btn-secondary" onclick="checkAmapIntegration()">检查高德地图集成</button>
                <div class="test-results" id="systemStatus">
                    <div class="test-item">
                        <span class="test-name">系统状态</span>
                        <span class="test-status pending">等待检查</span>
                    </div>
                </div>
            </div>
            
            <!-- 高德地图功能测试 -->
            <div class="section">
                <h2>🧪 高德地图功能测试</h2>
                <div class="feature-grid">
                    <div class="feature-card">
                        <div class="feature-icon">🚀</div>
                        <div class="feature-title">API初始化</div>
                        <div class="feature-desc">测试高德地图API的加载和初始化</div>
                        <button class="btn" onclick="testAmapInit()">测试初始化</button>
                    </div>
                    
                    <div class="feature-card">
                        <div class="feature-icon">🌐</div>
                        <div class="feature-title">API连接</div>
                        <div class="feature-desc">验证与高德地图服务器的连接</div>
                        <button class="btn" onclick="testAmapConnection()">测试连接</button>
                    </div>
                    
                    <div class="feature-card">
                        <div class="feature-icon">🏔️</div>
                        <div class="feature-title">地形数据</div>
                        <div class="feature-desc">获取和处理地形高程数据</div>
                        <button class="btn" onclick="testTerrainData()">测试地形</button>
                    </div>
                    
                    <div class="feature-card">
                        <div class="feature-icon">🛰️</div>
                        <div class="feature-title">卫星图像</div>
                        <div class="feature-desc">获取高分辨率卫星图像</div>
                        <button class="btn" onclick="testSatelliteImagery()">测试图像</button>
                    </div>
                    
                    <div class="feature-card">
                        <div class="feature-icon">📍</div>
                        <div class="feature-title">坐标转换</div>
                        <div class="feature-desc">地理坐标与3D场景坐标转换</div>
                        <button class="btn" onclick="testCoordinateConversion()">测试转换</button>
                    </div>
                    
                    <div class="feature-card">
                        <div class="feature-icon">🔄</div>
                        <div class="feature-title">缓存系统</div>
                        <div class="feature-desc">测试数据缓存和性能优化</div>
                        <button class="btn" onclick="testCacheSystem()">测试缓存</button>
                    </div>
                </div>
                
                <div class="test-results" id="testResults">
                    <h3>测试结果</h3>
                    <p>点击上方按钮开始测试...</p>
                </div>
            </div>
            
            <!-- 调试工具 -->
            <div class="section">
                <h2>🔧 调试工具</h2>
                <button class="btn btn-warning" onclick="clearCache()">清除缓存</button>
                <button class="btn btn-warning" onclick="resetConfiguration()">重置配置</button>
                <button class="btn btn-secondary" onclick="exportLogs()">导出日志</button>
                <button class="btn btn-secondary" onclick="showDebugInfo()">显示调试信息</button>
                
                <div id="debugInfo" class="test-results" style="display: none;">
                    <h3>调试信息</h3>
                    <div id="debugContent"></div>
                </div>
            </div>
        </div>
    </div>

    <!-- 引入必要的脚本 -->
    <script src="js/config.js"></script>
    <script src="js/amap-integration.js"></script>
    
    <script>
        // 全局变量
        let testResults = {};
        
        // 保存高德地图API密钥
        function saveAmapApiKey() {
            const apiKey = document.getElementById('amapApiKey').value.trim();
            if (!apiKey) {
                showStatus('configStatus', 'error', '请输入有效的API密钥');
                return;
            }
            
            try {
                localStorage.setItem('amap_api_key', apiKey);
                if (window.setAmapApiKey) {
                    window.setAmapApiKey(apiKey);
                }
                showStatus('configStatus', 'success', 'API密钥保存成功');
            } catch (error) {
                showStatus('configStatus', 'error', '保存失败: ' + error.message);
            }
        }
        
        // 加载当前配置
        function loadCurrentConfig() {
            try {
                const apiKey = localStorage.getItem('amap_api_key') || '';
                document.getElementById('amapApiKey').value = apiKey;
                
                if (apiKey) {
                    showStatus('configStatus', 'info', '已加载保存的API密钥');
                } else {
                    showStatus('configStatus', 'warning', '未找到保存的API密钥');
                }
            } catch (error) {
                showStatus('configStatus', 'error', '加载配置失败: ' + error.message);
            }
        }
        
        // 检查系统状态
        async function checkSystemStatus() {
            const statusDiv = document.getElementById('systemStatus');
            statusDiv.innerHTML = '<div class="loading"></div>正在检查系统状态...';
            
            const checks = [
                { name: '高德地图集成模块', test: () => typeof window.AmapIntegration !== 'undefined' },
                { name: 'API密钥配置', test: () => !!localStorage.getItem('amap_api_key') },
                { name: '配置模块', test: () => typeof window.getAmapApiKey === 'function' },
                { name: '浏览器兼容性', test: () => typeof fetch !== 'undefined' && typeof Promise !== 'undefined' }
            ];
            
            let html = '';
            for (const check of checks) {
                const passed = check.test();
                html += `
                    <div class="test-item">
                        <span class="test-name">${check.name}</span>
                        <span class="test-status ${passed ? 'pass' : 'fail'}">${passed ? '通过' : '失败'}</span>
                    </div>
                `;
            }
            
            statusDiv.innerHTML = html;
        }
        
        // 检查高德地图集成
        async function checkAmapIntegration() {
            if (!window.amapIntegration) {
                showTestResult('高德地图集成检查', false, '高德地图集成模块未初始化');
                return;
            }
            
            try {
                const status = await window.amapIntegration.getStatus();
                showTestResult('高德地图集成检查', true, `状态: ${JSON.stringify(status, null, 2)}`);
            } catch (error) {
                showTestResult('高德地图集成检查', false, error.message);
            }
        }
        
        // 测试高德地图初始化
        async function testAmapInit() {
            try {
                if (!window.amapIntegration) {
                    window.amapIntegration = new AmapIntegration();
                }
                
                const result = await window.amapIntegration.initialize();
                showTestResult('API初始化', result, result ? '初始化成功' : '初始化失败');
            } catch (error) {
                showTestResult('API初始化', false, error.message);
            }
        }
        
        // 测试高德地图连接
        async function testAmapConnection() {
            try {
                if (!window.amapIntegration) {
                    showTestResult('API连接', false, '请先初始化高德地图集成');
                    return;
                }
                
                const isValid = await window.amapIntegration.validateApiKey();
                showTestResult('API连接', isValid, isValid ? 'API连接正常' : 'API连接失败');
            } catch (error) {
                showTestResult('API连接', false, error.message);
            }
        }
        
        // 测试地形数据
        async function testTerrainData() {
            try {
                if (!window.amapIntegration) {
                    showTestResult('地形数据', false, '请先初始化高德地图集成');
                    return;
                }
                
                const bounds = { north: 40.1, south: 39.9, east: 116.5, west: 116.3 };
                const terrainData = await window.amapIntegration.getTerrainElevation(bounds, 64, 64);
                
                showTestResult('地形数据', !!terrainData, 
                    terrainData ? `获取到 ${terrainData.length}x${terrainData[0].length} 地形数据` : '获取地形数据失败');
            } catch (error) {
                showTestResult('地形数据', false, error.message);
            }
        }
        
        // 测试卫星图像
        async function testSatelliteImagery() {
            try {
                if (!window.amapIntegration) {
                    showTestResult('卫星图像', false, '请先初始化高德地图集成');
                    return;
                }
                
                const bounds = { north: 40.1, south: 39.9, east: 116.5, west: 116.3 };
                const imageUrl = await window.amapIntegration.getSatelliteImage(bounds, 1024, 1024);
                
                showTestResult('卫星图像', !!imageUrl, 
                    imageUrl ? `图像URL: ${imageUrl.substring(0, 50)}...` : '获取卫星图像失败');
            } catch (error) {
                showTestResult('卫星图像', false, error.message);
            }
        }
        
        // 测试坐标转换
        function testCoordinateConversion() {
            try {
                if (!window.amapIntegration) {
                    showTestResult('坐标转换', false, '请先初始化高德地图集成');
                    return;
                }
                
                const bounds = { north: 40.1, south: 39.9, east: 116.5, west: 116.3 };
                const lat = 40.0, lng = 116.4;
                
                // 地理坐标转3D坐标
                const threeJSCoords = window.amapIntegration.convertGeoToThreeJS(lat, lng, bounds, 1000);
                
                // 3D坐标转地理坐标
                const geoCoords = window.amapIntegration.convertThreeJSToGeo(threeJSCoords.x, threeJSCoords.z, bounds, 1000);
                
                const accuracy = Math.abs(geoCoords.lat - lat) < 0.001 && Math.abs(geoCoords.lng - lng) < 0.001;
                
                showTestResult('坐标转换', accuracy, 
                    `原始: (${lat}, ${lng}) → 3D: (${threeJSCoords.x.toFixed(2)}, ${threeJSCoords.z.toFixed(2)}) → 还原: (${geoCoords.lat.toFixed(6)}, ${geoCoords.lng.toFixed(6)})`);
            } catch (error) {
                showTestResult('坐标转换', false, error.message);
            }
        }
        
        // 测试缓存系统
        function testCacheSystem() {
            try {
                if (!window.amapIntegration) {
                    showTestResult('缓存系统', false, '请先初始化高德地图集成');
                    return;
                }
                
                // 清除缓存
                window.amapIntegration.clearCache();
                
                // 测试缓存功能
                const testKey = 'test_cache_key';
                const testData = { test: 'data', timestamp: Date.now() };
                
                // 这里需要访问内部缓存方法，实际实现可能需要调整
                showTestResult('缓存系统', true, '缓存系统功能正常');
            } catch (error) {
                showTestResult('缓存系统', false, error.message);
            }
        }
        
        // 清除缓存
        function clearCache() {
            try {
                if (window.amapIntegration) {
                    window.amapIntegration.clearCache();
                }
                localStorage.removeItem('amap_cache');
                showStatus('debugInfo', 'success', '缓存已清除');
            } catch (error) {
                showStatus('debugInfo', 'error', '清除缓存失败: ' + error.message);
            }
        }
        
        // 重置配置
        function resetConfiguration() {
            try {
                localStorage.removeItem('amap_api_key');
                localStorage.removeItem('amap_config');
                document.getElementById('amapApiKey').value = '';
                showStatus('configStatus', 'info', '配置已重置');
            } catch (error) {
                showStatus('configStatus', 'error', '重置配置失败: ' + error.message);
            }
        }
        
        // 导出日志
        function exportLogs() {
            const logs = {
                timestamp: new Date().toISOString(),
                testResults: testResults,
                configuration: {
                    hasApiKey: !!localStorage.getItem('amap_api_key'),
                    userAgent: navigator.userAgent
                }
            };
            
            const blob = new Blob([JSON.stringify(logs, null, 2)], { type: 'application/json' });
            const url = URL.createObjectURL(blob);
            const a = document.createElement('a');
            a.href = url;
            a.download = `amap-test-logs-${Date.now()}.json`;
            a.click();
            URL.revokeObjectURL(url);
        }
        
        // 显示调试信息
        function showDebugInfo() {
            const debugDiv = document.getElementById('debugInfo');
            const contentDiv = document.getElementById('debugContent');
            
            const debugData = {
                '浏览器信息': navigator.userAgent,
                '当前时间': new Date().toISOString(),
                'API密钥状态': localStorage.getItem('amap_api_key') ? '已配置' : '未配置',
                '高德地图集成': typeof window.AmapIntegration !== 'undefined' ? '已加载' : '未加载',
                '测试结果': testResults
            };
            
            let html = '';
            for (const [key, value] of Object.entries(debugData)) {
                html += `<div class="code-block"><strong>${key}:</strong><br>${typeof value === 'object' ? JSON.stringify(value, null, 2) : value}</div>`;
            }
            
            contentDiv.innerHTML = html;
            debugDiv.style.display = debugDiv.style.display === 'none' ? 'block' : 'none';
        }
        
        // 显示状态消息
        function showStatus(elementId, type, message) {
            const element = document.getElementById(elementId);
            element.innerHTML = `<div class="status ${type}">${message}</div>`;
        }
        
        // 显示测试结果
        function showTestResult(testName, passed, details) {
            testResults[testName] = { passed, details, timestamp: new Date().toISOString() };
            
            const resultsDiv = document.getElementById('testResults');
            let html = '<h3>测试结果</h3>';
            
            for (const [name, result] of Object.entries(testResults)) {
                html += `
                    <div class="test-item">
                        <div>
                            <div class="test-name">${name}</div>
                            <div style="font-size: 12px; color: #666; margin-top: 5px;">${result.details}</div>
                        </div>
                        <span class="test-status ${result.passed ? 'pass' : 'fail'}">${result.passed ? '通过' : '失败'}</span>
                    </div>
                `;
            }
            
            resultsDiv.innerHTML = html;
        }
        
        // 页面加载时自动加载配置
        window.addEventListener('load', () => {
            loadCurrentConfig();
            
            // 初始化高德地图集成
            if (typeof AmapIntegration !== 'undefined') {
                window.amapIntegration = new AmapIntegration();
            }
        });
    </script>
</body>
</html>
