<svg width="256" height="256" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <radialGradient id="waterGradient" cx="50%" cy="50%" r="50%">
      <stop offset="0%" style="stop-color:#87ceeb;stop-opacity:1" />
      <stop offset="50%" style="stop-color:#4682b4;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#1e90ff;stop-opacity:1" />
    </radialGradient>
    <pattern id="waterRipples" x="0" y="0" width="64" height="64" patternUnits="userSpaceOnUse">
      <circle cx="32" cy="32" r="20" fill="none" stroke="#ffffff" stroke-width="1" opacity="0.3"/>
      <circle cx="32" cy="32" r="15" fill="none" stroke="#ffffff" stroke-width="0.5" opacity="0.2"/>
      <circle cx="32" cy="32" r="10" fill="none" stroke="#ffffff" stroke-width="0.3" opacity="0.1"/>
    </pattern>
  </defs>
  <rect width="256" height="256" fill="url(#waterGradient)"/>
  <rect width="256" height="256" fill="url(#waterRipples)"/>
</svg>